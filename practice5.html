<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MY BootStrap Website</title>

    <!-- 🟢 1. BOOTSTRAP CSS LINK: Isse saari styling aur colors chalenge -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- Aapka Navbar (Bilkul Sahi) -->
    <nav class="navbar navbar-expand-lg bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Navbar</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Features</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Pricing</a>
            </li>
            <li class="nav-item">
              <!-- Choti galti theek ki: disabled link ko standard tareeqe se likha -->
              <a class="nav-link disabled" aria-disabled="true" tabindex="-1"
                >Disabled</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- 🟢 2. BOOTSTRAP JS LINK: Isse mobile screen par hamburger toggle button chalega -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <!-- 🟢 3. APNI SCRIPT FILE: Agar aap JS practice kar rahe ho, toh apni "script.js" file yahan link karo -->
    <!-- <script src="script.js"></script> -->
    <header class="bg-light py-5">
      <div class="container text-center">
        <h1 class="display-4 fw-bold">Welcome to My Website</h1>
        <p class="lead">Bootstrap seekhna behad aasan hai!</p>
        <button class="btn btn-primary btn-lg">Get Started</button>
      </div>
    </header>

    <section class="container my-5">
      <div class="row text-center">
        <!-- Card 1 (4 columns wide on medium+ screens) -->
        <div class="col-md-4 mb-4">
          <div class="card p-3 shadow-sm">
            <h3>Web Design</h3>
            <p>Clean and modern designs built with Bootstrap.</p>
          </div>
        </div>
        <!-- Card 2 -->
        <div class="col-md-4 mb-4">
          <div class="card p-3 shadow-sm">
            <h3>Development</h3>
            <p>Fast, responsive, and functional websites.</p>
          </div>
        </div>
        <!-- Card 3 -->
        <div class="col-md-4 mb-4">
          <div class="card p-3 shadow-sm">
            <h3>SEO</h3>
            <p>Optimized for search engines and performance.</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
